<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>River — Server Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: black; overflow: hidden; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        #status {
            position: fixed; top: 10px; left: 10px;
            color: #fff; font: 12px monospace;
            opacity: 0.7; pointer-events: none;
            text-shadow: 0 0 4px #000;
        }
        #info {
            position: fixed; bottom: 10px; left: 10px;
            color: #555; font: 11px monospace; pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="status">Connecting…</div>
    <div id="info">Server preview — raw simulation output, Canvas2D, no trails</div>
    <script src="fzstd.js"></script>
    <script src="constants.js"></script>
    <script>
'use strict';

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');

const dpr = window.devicePixelRatio || 1;
let width, height;

function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width  = Math.round(width  * dpr);
    canvas.height = Math.round(height * dpr);
    canvas.style.width  = width  + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

const params   = new URLSearchParams(window.location.search);
const isSecure = window.location.protocol === 'https:';
const serverAddr = params.get('server');
const wsUrl = serverAddr
    ? `${isSecure ? 'wss' : 'ws'}://${serverAddr}`
    : `${isSecure ? 'wss' : 'ws'}://${window.location.host}/ws`;

let useZstd = false;
let particles = [];
let sourceColors = false;

function unpackParticles(view) {
    const count = view.getUint32(5, true);
    while (particles.length < count) particles.push({});
    particles.length = count;
    let offset = 9;
    for (let i = 0; i < count; i++) {
        const p = particles[i];
        p.x         = view.getUint16(offset,     true) / 65535 * width;  offset += 2;
        p.y         = view.getUint16(offset,     true) / 65535 * height; offset += 2;
        p.opacity   = view.getUint8(offset++) / 255;
        p.radius    = view.getUint8(offset++) / 10;
        p.sourceIdx = view.getUint8(offset++);
        offset++; // flags
    }
}

function draw() {
    ctx.clearRect(0, 0, width, height);
    for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        if (p.opacity < 0.01) continue;
        if (sourceColors) {
            const c = RIVER_COLORS[p.sourceIdx % RIVER_COLORS.length];
            ctx.fillStyle = `rgb(${c[0]},${c[1]},${c[2]})`;
        } else {
            ctx.fillStyle = '#fff';
        }
        ctx.globalAlpha = p.opacity;
        const d = Math.max(1, p.radius * 2);
        ctx.fillRect(p.x - p.radius, p.y - p.radius, d, d);
    }
    ctx.globalAlpha = 1;
}

function connect() {
    statusEl.textContent = `Connecting to ${wsUrl}…`;
    const ws = new WebSocket(wsUrl);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
        useZstd = false;
        statusEl.textContent = 'Connected';
        ws.send(JSON.stringify({ type: 'register', role: 'preview' }));
    };

    ws.onmessage = (e) => {
        if (typeof e.data === 'string') {
            const msg = JSON.parse(e.data);
            if (msg.type === 'encoding' && msg.compression === 'zstd') {
                useZstd = typeof window.fzstd !== 'undefined';
            }
            if (msg.type === 'client_state') {
                sourceColors = !!msg.c;
            }
            return;
        }
        let raw = e.data;
        if (useZstd) {
            try { raw = window.fzstd.decompress(new Uint8Array(raw)).buffer; }
            catch (err) { return; }
        }
        const view = new DataView(raw);
        if (view.getUint8(0) === 0x00) {
            unpackParticles(view);
            draw();
        }
    };

    ws.onclose = () => {
        statusEl.textContent = 'Disconnected — reconnecting…';
        setTimeout(connect, 2000);
    };
    ws.onerror = () => ws.close();
}

connect();
    </script>
</body>
</html>

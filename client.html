<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>River Animation — Client</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: black; overflow: hidden; }
        #canvas-wrap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: center center; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        #vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #status {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #fff;
            font: 12px monospace;
            opacity: 0.7;
            pointer-events: none;
            transition: opacity 0.5s;
            text-shadow: 0 0 4px #000;
        }
        #status.hidden { opacity: 0; }
        #hint {
            position: fixed;
            bottom: 10px;
            left: 10px;
            color: #555;
            font: 11px monospace;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #hint.hidden { opacity: 0; }
        #fps {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: #555;
            font: 11px monospace;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #fps.hidden { opacity: 0; }
        #hint .key { transition: color 0.15s; }
        #hint .key.active { color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div id="canvas-wrap">
        <canvas id="canvas"></canvas>
        <canvas id="overlay"></canvas>
    </div>
    <div id="vignette"></div>
    <div id="status">Connecting...</div>
    <div id="fps">-- fps</div>
    <div id="hint">
        <span class="key" id="hint-T">T: transparent</span> |
        <span class="key" id="hint-C">C: source colors</span> |
        <span class="key" id="hint-W">W: wetness</span> |
        <span class="key" id="hint-E">E: erosion</span> |
        <span class="key" id="hint-B">B: branching</span> |
        <span class="key" id="hint-M">M: mix</span> |
        ↑↓: speed | 0: reset | H: hide
    </div>
    <script src="client.js"></script>
</body>
</html>
